experiment:
  id: qwen25-05b-helpsteer3-ppo-long512-baseline
  name: Qwen2.5 0.5B HelpSteer3 PPO long-512 baseline
  group: qwen25-05b-helpsteer3
  tags: [ppo, lora, kl-control, response-512, baseline]
  hypothesis: Conservative KL-controlled PPO can improve learned preference reward without response collapse.
  parent_runs:
    - qwen25-05b-helpsteer3-sft-4096
    - qwen25-05b-helpsteer3-reward-4096-epoch2

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  torch_dtype: bfloat16
  trust_remote_code: false
  gradient_checkpointing: false
  policy_init_checkpoint_dir: outputs/rlhf/qwen25_05b_helpsteer3_sft_4096/checkpoint_final
  ref_checkpoint_dir: outputs/rlhf/qwen25_05b_helpsteer3_sft_4096/checkpoint_final
  policy_device_map: null
  policy_load_in_4bit: false
  policy_load_in_8bit: false
  ref_device_map: null
  ref_torch_dtype: bfloat16
  ref_load_in_4bit: false
  ref_load_in_8bit: false

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

reward_model:
  checkpoint_dir: outputs/rlhf/qwen25_05b_helpsteer3_reward_4096_epoch2/checkpoint_best
  torch_dtype: bfloat16
  device_map: null
  load_in_4bit: false
  load_in_8bit: false

data:
  prompt_split: train
  # Keep this null for the full run. For a smoke test, set to 2000.
  max_prompt_samples: null

generation:
  max_prompt_length: 3072
  max_new_tokens: 512
  # EOS-collapse guard: do not let PPO learn the empty answer shortcut.
  min_new_tokens: 32
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  repetition_penalty: 1.05
  no_repeat_ngram_size: 4

kl:
  # Stronger anchoring than the failed group-relative run. The previous run had
  # abs_ref_logratio ~23 at the end, which means the policy left the reference.
  init_kl_coef: 0.18
  min_kl_coef: 0.14
  max_kl_coef: 3.00
  target_ref_kl: 0.02
  horizon: 10000
  adaptive: true

reward_shaping:
  reward_clip_min: -5.0
  reward_clip_max: 5.0
  length_penalty_coef: 0.002
  missing_eos_penalty: 0.0
  min_response_tokens: 32
  short_response_penalty: 0.5
  # Disabled for now. The prior group-relative + critic hybrid over-rewarded
  # short/eos completions and collapsed to blank outputs.
  group_normalize: false
  group_advantage_eps: 1.0e-6

ppo:
  learning_rate: 3.0e-7
  weight_decay: 0.0
  ppo_epochs: 1
  minibatch_size: 2
  clip_range: 0.06
  value_clip_range: 0.2
  value_coef: 0.05
  entropy_coef: 0.001
  max_grad_norm: 0.5
  target_policy_kl: 0.008
  gamma: 1.0
  lam: 0.95

train:
  output_dir: outputs/rlhf/qwen25_05b_helpsteer3_ppo_4096_epoch2_long512
  seed: 839
  device: cuda
  rollout_batch_size: 2
  num_generations_per_prompt: 1
  total_updates: 400
  # save_every is still supported, but checkpoint_every is clearer for new runs.
  checkpoint_every: 50
  checkpoint_subdir: checkpoints
  save_every: 50
  sample_every: 10
  artifact_every: 10

safety:
  start_after_updates: 10
  max_abs_ref_logratio: 0.75
  min_mean_response_tokens: 32
  max_empty_response_rate: 0.03

experiment:
  id: qwen25-05b-helpsteer3-trl-ppo-v1
  name: Qwen2.5 0.5B HelpSteer3 TRL PPO pilot
  group: qwen25-05b-helpsteer3-trl
  tags: [trl, ppo, lora, response-512, n-plus]
  hypothesis: Correct behavior log-probabilities, zero dropout, EOS penalties, and an RM-initialized critic improve PPO stability.
  parent_runs:
    - qwen25-05b-helpsteer3-trl-sft-v1
    - qwen25-05b-helpsteer3-trl-reward-v1

model:
  policy_model_path: outputs/trl/qwen25_05b_helpsteer3_sft_v1/final_merged_model
  reference_model_path: outputs/trl/qwen25_05b_helpsteer3_sft_v1/final_merged_model
  reward_model_path: outputs/trl/qwen25_05b_helpsteer3_reward_v1/final_merged_model
  reward_center_path: outputs/trl/qwen25_05b_helpsteer3_reward_v1/reward_center.json
  value_model_path: outputs/trl/qwen25_05b_helpsteer3_reward_v1/final_merged_model
  dtype: bfloat16
  trust_remote_code: false
  attn_implementation: sdpa

data:
  cache_dir: outputs/trl/data/helpsteer3_qwen25_05b_4096
  train_split: train
  eval_split: validation
  max_train_samples: null
  max_eval_samples: 256

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  bias: none
  task_type: CAUSAL_LM
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

ppo:
  total_episodes: 2048
  response_length: 512
  temperature: 0.7
  stop_token: eos
  missing_eos_penalty: 1.0
  num_ppo_epochs: 4
  num_mini_batches: 1
  local_rollout_forward_batch_size: 4
  kl_coef: 0.05
  kl_estimator: k1
  cliprange: 0.2
  cliprange_value: 0.2
  vf_coef: 0.1
  gamma: 1.0
  lam: 0.95
  whiten_rewards: false
  num_sample_generations: 8

train:
  output_dir: outputs/trl/qwen25_05b_helpsteer3_ppo_v1
  run_name: qwen25-05b-helpsteer3-trl-ppo-v1
  seed: 839
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-6
  weight_decay: 0.0
  max_grad_norm: 1.0
  warmup_ratio: 0.0
  lr_scheduler_type: linear
  optim: adamw_torch_fused
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  logging_steps: 1
  save_strategy: steps
  save_steps: 25
  save_total_limit: 2
  report_to: none
  resume_from_checkpoint: null
  checkpoint_sync_dir: null
  final_sync_dir: null
